<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organization Tree</title>
    <!-- Use Inter font for a modern look -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- Version-pinned with Subresource Integrity so the browser verifies these libraries.
         `teams-org extract` inlines them (also integrity-checked) unless run with --no-inline. -->
    <script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js" integrity="sha384-CjloA8y00+1SDAUkjs099PVfnY2KmDC2BZnws9kh8D/lX1s46w6EPhpXdqMfjK6i" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/d3-org-chart@3.1.0" integrity="sha384-jdNdDz72Yl0UnyMxO94TJN0XhwcJ5fB5IBuMJ3SWALIOOuR2XoRugVBewvDI9rH1" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/d3-flextree@2.1.2/build/d3-flextree.js" integrity="sha384-6pTgblH+kfP7e8kLkJxI96n+G6MCr28XHUtlXyr3cSjSyT/co6eOBwwCPAX8pBb5" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0" integrity="sha384-PCSoOZTpbkikBEtd/+uV3WNdc676i9KUf01KOA8CnJotvlx8rRrETbDuwdjqTYvt" crossorigin="anonymous"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0f172a; /* Sleek dark mode background */
            color: #f8fafc;
            overflow: hidden;
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,0.2) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,0.1) 0, transparent 50%);
        }
        
        #chart-container {
            width: 100vw;
            height: 100vh;
        }
        
        .node-card {
            background: #1e293b; /* Solid color instead of transparent+blur for massive performance gain */
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px;
            box-sizing: border-box;
            transition: transform 0.15s ease;
            color: white;
            position: relative;
            overflow: visible;
        }
        
        .node-card:hover {
            transform: translateY(-4px);
            border-color: rgba(99, 102, 241, 0.6);
            background: #27364f;
        }

        .node-image {
            width: 60px;
            height: 60px;
            min-width: 60px;
            min-height: 60px;
            flex-shrink: 0;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #6366f1;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #334155, #1e293b);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 600;
            color: #94a3b8;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
        }

        .node-name {
            font-size: 15px;
            font-weight: 600;
            margin: 0 0 4px 0;
            text-align: center;
            width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            letter-spacing: 0.3px;
            line-height: 1.4;
            padding-bottom: 2px;
            flex-shrink: 0;
        }

        .node-position {
            font-size: 12px;
            color: #94a3b8;
            margin: 0 0 12px 0;
            text-align: center;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .node-details {
            display: flex;
            flex-direction: column;
            gap: 6px;
            width: 100%;
            font-size: 11px;
            color: #cbd5e1;
            background: rgba(15, 23, 42, 0.4);
            padding: 8px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.15s ease;
        }

        .node-details:hover {
            background: rgba(15, 23, 42, 0.7);
        }

        .node-detail-more {
            font-size: 10px;
            color: #818cf8;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            display: flex;
            align-items: center;
            gap: 6px;
            padding-top: 2px;
        }
        
        .node-detail-item {
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.4;
            padding-bottom: 2px;
        }

        .node-detail-icon {
            opacity: 0.6;
            font-size: 12px;
        }

        .badge-count {
            position: absolute;
            top: -8px;
            right: -8px;
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: white;
            border-radius: 50%;
            width: 26px;
            height: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            border: 2px solid #1e293b;
        }
        
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 20px;
            font-weight: 400;
            letter-spacing: 3px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(99, 102, 241, 0.3);
            border-radius: 50%;
            border-top-color: #6366f1;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Search Bar Styles */
        .search-container {
            position: absolute;
            top: 24px;
            right: 24px;
            z-index: 100;
            width: 320px;
        }
        .search-input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px);
            color: white;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            outline: none;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
            box-sizing: border-box;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .search-input:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }
        .search-input::placeholder {
            color: #94a3b8;
        }
        .search-results {
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            width: 100%;
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            max-height: 400px;
            overflow-y: auto;
            display: none;
            box-sizing: border-box;
        }
        .search-results.active {
            display: block;
        }
        .search-result-item {
            padding: 12px 16px;
            cursor: pointer;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            transition: background 0.15s;
        }
        .search-result-item:last-child {
            border-bottom: none;
        }
        .search-result-item:hover, .search-result-item.selected {
            background: rgba(99, 102, 241, 0.25);
        }
        .result-name {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 4px;
        }
        .result-role {
            font-size: 12px;
            color: #94a3b8;
        }
        
        .node-card.highlighted {
            border-color: #38bdf8;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.3);
            background: #203554;
        }

        /* Settings cogwheel */
        .settings-container {
            position: absolute;
            top: 24px;
            left: 24px;
            z-index: 100;
        }
        .settings-btn {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px);
            color: #cbd5e1;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
        }
        .settings-btn:hover {
            border-color: #6366f1;
            transform: rotate(30deg);
        }
        .settings-panel {
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            width: 260px;
            background: rgba(30, 41, 59, 0.97);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.4);
            padding: 14px;
            display: none;
            box-sizing: border-box;
        }
        .settings-panel.active {
            display: block;
        }
        .settings-title {
            font-size: 13px;
            font-weight: 600;
            color: #e2e8f0;
            margin-bottom: 2px;
        }
        .settings-hint {
            font-size: 11px;
            color: #94a3b8;
            margin-bottom: 10px;
        }
        .settings-option {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 7px 8px;
            border-radius: 8px;
            font-size: 13px;
            color: #cbd5e1;
            cursor: pointer;
            transition: background 0.15s;
            user-select: none;
        }
        .settings-option:hover {
            background: rgba(99, 102, 241, 0.15);
        }
        .settings-option input {
            accent-color: #6366f1;
            width: 15px;
            height: 15px;
            cursor: pointer;
        }
        .settings-option.disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .settings-option.disabled:hover {
            background: transparent;
        }
        .settings-option-icon {
            opacity: 0.75;
        }

        /* Contact overlay */
        .contact-overlay {
            position: fixed;
            inset: 0;
            background: rgba(2, 6, 23, 0.72);
            backdrop-filter: blur(4px);
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .contact-overlay.active {
            display: flex;
        }
        .contact-modal {
            width: 420px;
            max-width: calc(100vw - 48px);
            max-height: calc(100vh - 48px);
            overflow-y: auto;
            background: #1e293b;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.6);
            padding: 24px;
            position: relative;
            box-sizing: border-box;
        }
        .contact-close {
            position: absolute;
            top: 14px;
            right: 14px;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            border: none;
            background: rgba(148, 163, 184, 0.15);
            color: #cbd5e1;
            font-size: 20px;
            line-height: 1;
            cursor: pointer;
            transition: background 0.15s;
        }
        .contact-close:hover {
            background: rgba(148, 163, 184, 0.3);
        }
        .contact-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
        }
        .contact-avatar {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            object-fit: cover;
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            font-weight: 600;
            flex-shrink: 0;
        }
        .contact-name {
            font-size: 18px;
            font-weight: 600;
            color: #f1f5f9;
        }
        .contact-position {
            font-size: 13px;
            color: #94a3b8;
            margin-top: 2px;
        }
        .contact-body {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .contact-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 4px;
            border-top: 1px solid rgba(255,255,255,0.06);
            font-size: 14px;
            color: #e2e8f0;
        }
        .contact-row-icon {
            width: 20px;
            text-align: center;
            opacity: 0.8;
        }
        .contact-row-label {
            width: 110px;
            color: #94a3b8;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            flex-shrink: 0;
        }
        .contact-row-value {
            word-break: break-word;
        }
        .contact-empty {
            color: #94a3b8;
            font-size: 13px;
            padding: 8px 4px;
        }
    </style>
</head>
<body>
    <div class="settings-container">
        <button id="settings-btn" class="settings-btn" title="Choose card fields">⚙️</button>
        <div id="settings-panel" class="settings-panel">
            <div class="settings-title">Card fields</div>
            <div class="settings-hint">Pick up to 3 fields to show on each card.</div>
            <div id="settings-options"></div>
        </div>
    </div>
    <div class="search-container">
        <input type="text" id="search-input" class="search-input" placeholder="Search employees or roles..." autocomplete="off">
        <div id="search-results" class="search-results"></div>
    </div>
    <div id="contact-overlay" class="contact-overlay">
        <div class="contact-modal">
            <button class="contact-close" id="contact-close" title="Close">&times;</button>
            <div class="contact-header">
                <div id="contact-avatar" class="contact-avatar"></div>
                <div>
                    <div id="contact-name" class="contact-name"></div>
                    <div id="contact-position" class="contact-position"></div>
                </div>
            </div>
            <div id="contact-body" class="contact-body"></div>
        </div>
    </div>
    <div id="loading" class="loading">
        <div class="spinner"></div>
        LOADING ORGANIZATION DATA
    </div>
    <div id="chart-container"></div>

    <!-- ORG_DATA_PLACEHOLDER -->
    <script>
        (function () {
            const embeddedTreeElement = document.getElementById('org-data-embedded');
            const embeddedPhotosElement = document.getElementById('org-photos-embedded');
            let orgDataPromise;
            if (embeddedTreeElement) {
                // Portable build: data is embedded directly in the page.
                orgDataPromise = Promise.resolve().then(() => ({
                    tree: JSON.parse(embeddedTreeElement.textContent),
                    photos: embeddedPhotosElement ? JSON.parse(embeddedPhotosElement.textContent) : {}
                }));
            } else {
                // Dev mode: fetch the raw JSON files served next to this template.
                orgDataPromise = Promise.all([
                    fetch('org_tree.json').then(response => {
                        if (!response.ok) throw new Error("Could not load org_tree.json");
                        return response.json();
                    }),
                    fetch('photos.json').then(response => response.ok ? response.json() : {}).catch(() => ({}))
                ]).then(([tree, photos]) => ({ tree, photos }));
            }
            orgDataPromise
            .then(({ tree, photos }) => {
                document.getElementById('loading').style.display = 'none';

                // Catalog of profile fields that can be shown on cards / in the overlay.
                const FIELD_DEFINITIONS = [
                    { key: 'email', label: 'Email', icon: '✉️', get: person => person.email },
                    { key: 'role', label: 'Department', icon: '🏢', get: person => person.role },
                    { key: 'mobilePhone', label: 'Mobile', icon: '📱', get: person => person.mobilePhone },
                    { key: 'businessPhone', label: 'Business phone', icon: '☎️', get: person => person.businessPhone },
                    { key: 'officeLocation', label: 'Office', icon: '🏬', get: person => person.officeLocation },
                    { key: 'location', label: 'Location', icon: '📍', get: person => [person.city, person.state, person.country].filter(Boolean).join(', ') },
                    { key: 'companyName', label: 'Company', icon: '🏛️', get: person => person.companyName },
                    { key: 'employeeId', label: 'Employee ID', icon: '🆔', get: person => person.employeeId },
                ];
                const MAX_CARD_FIELDS = 3;
                const FIELD_DEFINITION_BY_KEY = Object.fromEntries(FIELD_DEFINITIONS.map(field => [field.key, field]));

                // Which fields show on the cards (persisted, capped at MAX_CARD_FIELDS).
                function loadSelectedCardFields() {
                    try {
                        const savedFields = JSON.parse(localStorage.getItem('teamsOrg.cardFields'));
                        if (Array.isArray(savedFields)) {
                            const validFields = savedFields.filter(key => FIELD_DEFINITION_BY_KEY[key]).slice(0, MAX_CARD_FIELDS);
                            if (validFields.length) return validFields;
                        }
                    } catch (error) { /* ignore malformed stored value */ }
                    return ['email', 'role', 'mobilePhone'];
                }
                let selectedCardFields = loadSelectedCardFields();

                const escapeHtml = (value) => String(value == null ? '' : value)
                    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');

                // Flatten the nested tree into the flat id/parentId list d3-org-chart expects.
                // A visited set guards against manager cycles (which would otherwise recurse forever).
                let peopleList = [];
                function flattenTree(nodes, visitedIds = new Set()) {
                    nodes.forEach(node => {
                        if (visitedIds.has(node.id)) return;
                        visitedIds.add(node.id);
                        peopleList.push({
                            id: node.id,
                            parentId: node.parentId || "",
                            name: node.name,
                            position: node.position,
                            email: node.email,
                            role: node.role,
                            mobilePhone: node.mobilePhone || "",
                            businessPhone: node.businessPhone || "",
                            officeLocation: node.officeLocation || "",
                            city: node.city || "",
                            state: node.state || "",
                            country: node.country || "",
                            companyName: node.companyName || "",
                            employeeId: node.employeeId || "",
                            directReportCount: node.children ? node.children.length : 0
                        });
                        if (node.children && node.children.length > 0) {
                            flattenTree(node.children, visitedIds);
                        }
                    });
                }

                flattenTree(tree);

                const rootPeople = peopleList.filter(person => !person.parentId);
                if (rootPeople.length > 1) {
                    // Group the isolated / external roots under synthetic parent nodes so the
                    // chart has a single visual root instead of many disconnected trees.
                    peopleList.push({
                        id: "UNCATEGORIZED",
                        parentId: "ROOT",
                        name: "Uncategorized",
                        position: "Unassigned",
                        email: "",
                        role: "",
                        directReportCount: 0
                    });

                    peopleList.push({
                        id: "EXTERN",
                        parentId: "ROOT",
                        name: "Externals",
                        position: "External Partners / Contractors",
                        email: "",
                        role: "",
                        directReportCount: 0
                    });

                    let realRootCount = 0;
                    let uncategorizedCount = 0;
                    let externalCount = 0;

                    // A root counts as "external" when the word "extern" appears as a whole
                    // word in its title or department (matches "Extern", "External", not "Externship Coordinator").
                    const looksExternal = (person) => {
                        const externalWordPattern = /\bextern/i;
                        return externalWordPattern.test(person.position || '') || externalWordPattern.test(person.role || '');
                    };

                    rootPeople.forEach(person => {
                        const isEmployeeWithoutTitle = !person.position || person.position.trim().toLowerCase() === 'employee';

                        if (looksExternal(person)) {
                            person.parentId = "EXTERN";
                            externalCount++;
                        } else if (person.directReportCount === 0 && isEmployeeWithoutTitle) {
                            person.parentId = "UNCATEGORIZED";
                            uncategorizedCount++;
                        } else {
                            person.parentId = "ROOT";
                            realRootCount++;
                        }
                    });

                    const uncategorizedNode = peopleList.find(person => person.id === "UNCATEGORIZED");
                    uncategorizedNode.directReportCount = uncategorizedCount;
                    if (uncategorizedCount === 0) {
                        peopleList = peopleList.filter(person => person.id !== "UNCATEGORIZED");
                    }

                    const externalNode = peopleList.find(person => person.id === "EXTERN");
                    externalNode.directReportCount = externalCount;
                    if (externalCount === 0) {
                        peopleList = peopleList.filter(person => person.id !== "EXTERN");
                    }

                    peopleList.push({
                        id: "ROOT",
                        parentId: "",
                        name: "Organization",
                        position: "Company",
                        email: "",
                        role: "",
                        directReportCount: realRootCount + (uncategorizedCount > 0 ? 1 : 0) + (externalCount > 0 ? 1 : 0)
                    });
                } else if (rootPeople.length === 0 && peopleList.length > 0) {
                    // Everyone had a manager (a full cycle broken above): promote the first person to root.
                    peopleList[0].parentId = "";
                }

                // Sort so people with more direct reports appear first (at the top/left of branches).
                peopleList.sort((first, second) => second.directReportCount - first.directReportCount);

                window.highlightedNodeId = null;

                const chart = new d3.OrgChart()
                    .container('#chart-container')
                    .data(peopleList)
                    .nodeWidth(() => 260)
                    .nodeHeight(() => 240)
                    .childrenMargin(() => 50)
                    .compactMarginBetween(() => 40)
                    .compactMarginPair(() => 40)
                    // Expand two levels by default so the structure is visible without
                    // expanding the whole (potentially huge) org up front.
                    .initialExpandLevel(2)
                    .linkUpdate(function (linkData, linkIndex, linkElements) {
                        d3.select(this)
                            .attr('stroke', 'rgba(148, 163, 184, 0.3)')
                            .attr('stroke-width', 2);
                    })
                    .nodeContent(function (chartNode, nodeIndex, allNodes, chartState) {
                        const person = chartNode.data;
                        const hasDirectReports = person.directReportCount > 0;
                        const photoDataUrl = photos[person.id];
                        const avatarMarkup = photoDataUrl
                            ? `<img class="node-image" loading="lazy" src="${photoDataUrl}" />`
                            : `<div class="node-image">${escapeHtml(person.name.charAt(0))}</div>`;

                        const isHighlighted = person.id === window.highlightedNodeId;

                        return `
                            <div style="padding-top: 15px; height: 100%;">
                                <div class="node-card ${isHighlighted ? 'highlighted' : ''}" style="height: 220px; width: 260px;">
                                    ${hasDirectReports ? `<div class="badge-count">${person.directReportCount}</div>` : ''}
                                    ${avatarMarkup}
                                    <div class="node-name" title="${escapeHtml(person.name)}">${escapeHtml(person.name)}</div>
                                    <div class="node-position" title="${escapeHtml(person.position)}">${escapeHtml(person.position || '')}</div>
                                    <div class="node-details" onclick="event.stopPropagation(); window.showContact('${person.id}')" title="Click for full contact info">
                                        ${selectedCardFields
                                            .map(key => FIELD_DEFINITION_BY_KEY[key])
                                            .filter(Boolean)
                                            .map(field => ({ icon: field.icon, value: field.get(person) }))
                                            .filter(entry => entry.value)
                                            .map(entry => `
                                        <div class="node-detail-item" title="${escapeHtml(entry.value)}">
                                            <span class="node-detail-icon">${entry.icon}</span> ${escapeHtml(entry.value)}
                                        </div>`).join('')}
                                        <div class="node-detail-more">👤 View contact</div>
                                    </div>
                                </div>
                            </div>
                        `;
                    })
                    .render();

                // ---- Contact overlay ----
                const overlay = document.getElementById('contact-overlay');
                window.showContact = function (personId) {
                    const person = peopleList.find(candidate => candidate.id === personId);
                    if (!person) return;

                    const avatar = document.getElementById('contact-avatar');
                    const photoDataUrl = photos[person.id];
                    if (photoDataUrl) {
                        avatar.innerHTML = '';
                        avatar.style.backgroundImage = `url("${photoDataUrl}")`;
                        avatar.style.backgroundSize = 'cover';
                        avatar.style.backgroundPosition = 'center';
                    } else {
                        avatar.style.backgroundImage = 'none';
                        avatar.textContent = (person.name || '?').charAt(0);
                    }

                    document.getElementById('contact-name').textContent = person.name || '';
                    document.getElementById('contact-position').textContent = person.position || '';

                    const contactRows = FIELD_DEFINITIONS
                        .map(field => ({ label: field.label, icon: field.icon, value: field.get(person) }))
                        .filter(row => row.value)
                        .map(row => `
                            <div class="contact-row">
                                <span class="contact-row-icon">${row.icon}</span>
                                <span class="contact-row-label">${escapeHtml(row.label)}</span>
                                <span class="contact-row-value">${escapeHtml(row.value)}</span>
                            </div>`).join('');
                    document.getElementById('contact-body').innerHTML =
                        contactRows || '<div class="contact-empty">No additional contact information available.</div>';

                    overlay.classList.add('active');
                };
                window.hideContact = function () {
                    overlay.classList.remove('active');
                };
                document.getElementById('contact-close').addEventListener('click', window.hideContact);
                overlay.addEventListener('click', (event) => {
                    if (event.target === overlay) window.hideContact();
                });
                document.addEventListener('keydown', (event) => {
                    if (event.key === 'Escape') window.hideContact();
                });

                // ---- Settings cogwheel: choose up to 3 card fields ----
                const settingsButton = document.getElementById('settings-btn');
                const settingsPanel = document.getElementById('settings-panel');
                const settingsOptions = document.getElementById('settings-options');

                function renderSettingsOptions() {
                    const atMaximumFields = selectedCardFields.length >= MAX_CARD_FIELDS;
                    settingsOptions.innerHTML = FIELD_DEFINITIONS.map(field => {
                        const isSelected = selectedCardFields.includes(field.key);
                        const isDisabled = !isSelected && atMaximumFields;
                        return `
                            <label class="settings-option ${isDisabled ? 'disabled' : ''}">
                                <input type="checkbox" value="${field.key}" ${isSelected ? 'checked' : ''} ${isDisabled ? 'disabled' : ''}>
                                <span class="settings-option-icon">${field.icon}</span>
                                <span>${escapeHtml(field.label)}</span>
                            </label>`;
                    }).join('');
                }

                function applySelectedCardFields() {
                    localStorage.setItem('teamsOrg.cardFields', JSON.stringify(selectedCardFields));
                    chart.render();
                }

                settingsOptions.addEventListener('change', (event) => {
                    const checkbox = event.target;
                    if (!checkbox || checkbox.type !== 'checkbox') return;
                    if (checkbox.checked) {
                        if (!selectedCardFields.includes(checkbox.value) && selectedCardFields.length < MAX_CARD_FIELDS) {
                            selectedCardFields.push(checkbox.value);
                        }
                    } else {
                        selectedCardFields = selectedCardFields.filter(key => key !== checkbox.value);
                    }
                    renderSettingsOptions();
                    applySelectedCardFields();
                });

                settingsButton.addEventListener('click', (event) => {
                    event.stopPropagation();
                    settingsPanel.classList.toggle('active');
                });
                document.addEventListener('click', (event) => {
                    if (!event.target.closest('.settings-container')) {
                        settingsPanel.classList.remove('active');
                    }
                });
                renderSettingsOptions();

                const fuzzySearch = new Fuse(peopleList, {
                    keys: ['name', 'role', 'position', 'email'],
                    threshold: 0.3,
                    distance: 100
                });

                const searchInput = document.getElementById('search-input');
                const searchResults = document.getElementById('search-results');

                let selectedSearchIndex = -1;

                function updateSearchSelection() {
                    const resultItems = Array.from(searchResults.querySelectorAll('.search-result-item'));
                    resultItems.forEach((item, itemIndex) => {
                        if (itemIndex === selectedSearchIndex) {
                            item.classList.add('selected');
                            item.scrollIntoView({ block: 'nearest' });
                        } else {
                            item.classList.remove('selected');
                        }
                    });
                }

                searchInput.addEventListener('input', (event) => {
                    selectedSearchIndex = -1; // Reset selection on new input
                    const query = event.target.value;
                    if (!query) {
                        searchResults.classList.remove('active');
                        return;
                    }

                    const matches = fuzzySearch.search(query).slice(0, 8); // Show top 8 matches

                    if (matches.length === 0) {
                        searchResults.innerHTML = '<div style="padding:12px; color:#94a3b8; font-size:13px; text-align:center;">No results found</div>';
                    } else {
                        searchResults.innerHTML = matches.map(match => `
                            <div class="search-result-item" data-id="${escapeHtml(match.item.id)}">
                                <div class="result-name">${escapeHtml(match.item.name)}</div>
                                <div class="result-role">${escapeHtml(match.item.position || match.item.role || 'Employee')}</div>
                            </div>
                        `).join('');
                    }
                    searchResults.classList.add('active');
                });

                searchInput.addEventListener('keydown', (event) => {
                    const resultItems = Array.from(searchResults.querySelectorAll('.search-result-item'));
                    if (resultItems.length === 0 || !searchResults.classList.contains('active')) return;

                    if (event.key === 'ArrowDown') {
                        event.preventDefault();
                        selectedSearchIndex = Math.min(selectedSearchIndex + 1, resultItems.length - 1);
                        updateSearchSelection();
                    } else if (event.key === 'ArrowUp') {
                        event.preventDefault();
                        selectedSearchIndex = Math.max(selectedSearchIndex - 1, -1);
                        updateSearchSelection();
                    } else if (event.key === 'Enter') {
                        event.preventDefault();
                        if (selectedSearchIndex >= 0 && selectedSearchIndex < resultItems.length) {
                            resultItems[selectedSearchIndex].click();
                        } else if (resultItems.length > 0) {
                            // If they press enter without selecting, default to the first one
                            resultItems[0].click();
                        }
                    }
                });

                searchResults.addEventListener('click', (event) => {
                    const resultItem = event.target.closest('.search-result-item');
                    if (!resultItem) return;

                    const nodeId = resultItem.getAttribute('data-id');

                    // Hide results
                    searchResults.classList.remove('active');
                    searchInput.value = resultItem.querySelector('.result-name').innerText;

                    // Update state and rerender to show highlight
                    window.highlightedNodeId = nodeId;

                    chart.clearHighlighting();
                    chart.setUpToTheRootHighlighted(nodeId);
                    chart.render();

                    // Delay centering slightly to allow expansion animation
                    setTimeout(() => {
                        chart.center(nodeId);
                    }, 300);
                });

                // Close dropdown when clicking outside
                document.addEventListener('click', (event) => {
                    if (!event.target.closest('.search-container')) {
                        searchResults.classList.remove('active');
                    }
                });

                // Instead of expanding the entire organization (which causes massive lag for large orgs),
                // we expand only a few levels (see initialExpandLevel) and let the user expand manually.
                chart.fit();
            })
            .catch(error => {
                document.getElementById('loading').innerHTML = `
                    <div style="text-align: center; color: #f87171; max-width: 400px; padding: 24px; background: rgba(30, 41, 59, 0.8); border-radius: 12px; border: 1px solid rgba(248, 113, 113, 0.2);">
                        <h3 style="margin-top: 0; font-weight: 500;">Error Loading Data</h3>
                        <p style="opacity: 0.9;">${error.message}</p>
                        <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 16px 0;">
                        <p style="font-size: 13px; color: #94a3b8; text-align: left; line-height: 1.5; margin-bottom: 0;">
                            1. Did you run <code>teams-org extract</code> to generate <strong>org_tree.json</strong>?<br>
                            2. Are you serving this file via a local web server?<br>
                            <span style="color: #6366f1; font-family: monospace; display: block; margin-top: 8px; padding: 8px; background: rgba(0,0,0,0.3); border-radius: 6px;">teams-org extract</span>
                        </p>
                    </div>
                `;
            });
        })();
    </script>
</body>
</html>
