<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organization Tree</title>
    <!-- Use Inter font for a modern look -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- Version-pinned with Subresource Integrity so the browser verifies these libraries.
         `teams-org extract` inlines them (also integrity-checked) unless run with --no-inline. -->
    <script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js" integrity="sha384-CjloA8y00+1SDAUkjs099PVfnY2KmDC2BZnws9kh8D/lX1s46w6EPhpXdqMfjK6i" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/d3-org-chart@3.1.0" integrity="sha384-jdNdDz72Yl0UnyMxO94TJN0XhwcJ5fB5IBuMJ3SWALIOOuR2XoRugVBewvDI9rH1" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/d3-flextree@2.1.2/build/d3-flextree.js" integrity="sha384-6pTgblH+kfP7e8kLkJxI96n+G6MCr28XHUtlXyr3cSjSyT/co6eOBwwCPAX8pBb5" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0" integrity="sha384-PCSoOZTpbkikBEtd/+uV3WNdc676i9KUf01KOA8CnJotvlx8rRrETbDuwdjqTYvt" crossorigin="anonymous"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0f172a; /* Sleek dark mode background */
            color: #f8fafc;
            overflow: hidden;
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,0.2) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,0.1) 0, transparent 50%);
        }
        
        #chart-container {
            width: 100vw;
            height: 100vh;
        }
        
        .node-card {
            background: #1e293b; /* Solid color instead of transparent+blur for massive performance gain */
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px;
            box-sizing: border-box;
            transition: transform 0.15s ease;
            color: white;
            position: relative;
            overflow: visible;
            cursor: pointer;
        }
        
        .node-card:hover {
            transform: translateY(-4px);
            border-color: rgba(99, 102, 241, 0.6);
            background: #27364f;
        }

        /* Category grouping cards (Organization, Uncategorized, Externals) are
           structural containers, not real people — style them distinctly so they
           read as sections rather than staff. */
        .node-card.category-card {
            background: linear-gradient(135deg, #312e81, #1e1b4b);
            border: 1px dashed rgba(129, 140, 248, 0.55);
        }

        .node-card.category-card:hover {
            background: linear-gradient(135deg, #3730a3, #1e1b4b);
            border-color: rgba(129, 140, 248, 0.85);
        }

        .node-card.category-card .node-image {
            border-radius: 14px;
            border-color: #818cf8;
            background: linear-gradient(135deg, #4f46e5, #312e81);
            color: #e0e7ff;
        }

        .node-card.category-card .node-name {
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #c7d2fe;
        }

        .node-image {
            width: 60px;
            height: 60px;
            min-width: 60px;
            min-height: 60px;
            flex-shrink: 0;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #6366f1;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #334155, #1e293b);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 600;
            color: #94a3b8;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
        }

        .node-name {
            font-size: 15px;
            font-weight: 600;
            margin: 0 0 4px 0;
            text-align: center;
            width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            letter-spacing: 0.3px;
            line-height: 1.4;
            padding-bottom: 2px;
            flex-shrink: 0;
        }

        .node-position {
            font-size: 12px;
            color: #94a3b8;
            margin: 0 0 8px 0;
            text-align: center;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .node-details {
            display: flex;
            flex-direction: column;
            gap: 6px;
            width: 100%;
            font-size: 11px;
            color: #cbd5e1;
            background: rgba(15, 23, 42, 0.4);
            padding: 8px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.15s ease;
        }

        .node-details:hover {
            background: rgba(15, 23, 42, 0.7);
        }

        .node-detail-item {
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.4;
            padding-bottom: 2px;
        }

        .node-detail-icon {
            opacity: 0.6;
            font-size: 12px;
        }

        /* Expand / collapse button showing how many people report to a node. */
        .expand-button {
            width: 100%;
            height: 100%;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: white;
            border-radius: 999px;
            font-size: 14px;
            font-weight: 700;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            letter-spacing: 0.3px;
            box-shadow: 0 4px 10px rgba(79, 70, 229, 0.45);
            border: 2px solid #1e293b;
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.15s ease, filter 0.15s ease;
        }
        .expand-button:hover {
            transform: scale(1.08);
            box-shadow: 0 6px 16px rgba(79, 70, 229, 0.65);
            filter: brightness(1.08);
        }
        .expand-button-chevron {
            font-size: 9px;
            line-height: 1;
            opacity: 0.85;
        }
        
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 20px;
            font-weight: 400;
            letter-spacing: 3px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(99, 102, 241, 0.3);
            border-radius: 50%;
            border-top-color: #6366f1;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Top control bars */
        .controls-left {
            position: absolute;
            top: 24px;
            left: 24px;
            z-index: 100;
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }
        .controls-right {
            position: absolute;
            top: 24px;
            right: 24px;
            z-index: 100;
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }

        /* Search Bar Styles */
        .search-container {
            position: relative;
            width: 320px;
        }
        .search-input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px);
            color: white;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            outline: none;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
            box-sizing: border-box;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .search-input:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }
        .search-input::placeholder {
            color: #94a3b8;
        }
        .search-results {
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            width: 100%;
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            max-height: 400px;
            overflow-y: auto;
            display: none;
            box-sizing: border-box;
        }
        .search-results.active {
            display: block;
        }
        .search-result-item {
            padding: 12px 16px;
            cursor: pointer;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            transition: background 0.15s;
        }
        .search-result-item:last-child {
            border-bottom: none;
        }
        .search-result-item:hover, .search-result-item.selected {
            background: rgba(99, 102, 241, 0.25);
        }
        .result-name {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 4px;
        }
        .result-role {
            font-size: 12px;
            color: #94a3b8;
        }
        
        .node-card.highlighted {
            border-color: #38bdf8;
            border-width: 2px;
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.55), 0 0 28px 6px rgba(56, 189, 248, 0.55);
            background: #24476b;
        }

        /* d3-org-chart outlines the whole node cell when a node is highlighted, which
           looks like it hugs the empty area around the card. Hide that outline so only
           the card itself (via .node-card.highlighted) shows the highlight. */
        #chart-container .node-rect {
            stroke: transparent !important;
        }

        /* Settings cogwheel */
        .settings-container {
            position: relative;
        }
        .collapse-btn {
            height: 44px;
            padding: 0 16px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px);
            color: #cbd5e1;
            font-size: 13px;
            font-weight: 500;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            cursor: pointer;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }
        .collapse-btn:hover {
            border-color: #6366f1;
            background: #27364f;
        }
        .collapse-btn-icon {
            font-size: 15px;
            line-height: 1;
        }
        /* Direction picker: a button that opens a panel of layout choices. */
        .direction-container {
            position: relative;
        }
        .direction-panel {
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            width: 240px;
            background: rgba(30, 41, 59, 0.97);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.4);
            padding: 14px;
            display: none;
            box-sizing: border-box;
        }
        .direction-panel.active {
            display: block;
        }
        .direction-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 10px;
        }
        .direction-option {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            padding: 12px 8px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(15, 23, 42, 0.7);
            color: #cbd5e1;
            font-size: 12px;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: border-color 0.15s, background 0.15s, color 0.15s;
        }
        .direction-option:hover {
            border-color: #6366f1;
            background: rgba(99, 102, 241, 0.15);
        }
        .direction-option.active {
            border-color: #6366f1;
            background: rgba(99, 102, 241, 0.25);
            color: #ffffff;
        }
        .direction-option-icon {
            font-size: 20px;
            line-height: 1;
        }
        .settings-btn {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px);
            color: #cbd5e1;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
        }
        .settings-btn:hover {
            border-color: #6366f1;
            transform: rotate(30deg);
        }
        .settings-panel {
            position: absolute;
            top: calc(100% + 8px);
            right: 0;
            width: 260px;
            background: rgba(30, 41, 59, 0.97);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.4);
            padding: 14px;
            display: none;
            box-sizing: border-box;
        }
        .settings-panel.active {
            display: block;
        }
        .settings-title {
            font-size: 13px;
            font-weight: 600;
            color: #e2e8f0;
            margin-bottom: 2px;
        }
        .settings-hint {
            font-size: 11px;
            color: #94a3b8;
            margin-bottom: 10px;
        }
        .settings-option {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 7px 8px;
            border-radius: 8px;
            font-size: 13px;
            color: #cbd5e1;
            cursor: pointer;
            transition: background 0.15s;
            user-select: none;
        }
        .settings-option:hover {
            background: rgba(99, 102, 241, 0.15);
        }
        .settings-option input {
            accent-color: #6366f1;
            width: 15px;
            height: 15px;
            cursor: pointer;
        }
        .settings-option.disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .settings-option.disabled:hover {
            background: transparent;
        }
        .settings-option-icon {
            opacity: 0.75;
        }

        /* Filter panel */
        .filter-container {
            position: relative;
        }
        .filter-count-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 18px;
            height: 18px;
            padding: 0 5px;
            border-radius: 999px;
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: white;
            font-size: 11px;
            font-weight: 700;
            line-height: 1;
        }
        .filter-panel {
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            width: 300px;
            max-height: 70vh;
            overflow-y: auto;
            background: rgba(30, 41, 59, 0.97);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.4);
            padding: 14px;
            display: none;
            box-sizing: border-box;
        }
        .filter-panel.active {
            display: block;
        }
        .filter-category {
            margin-bottom: 14px;
        }
        .filter-category-label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #cbd5e1;
            margin-bottom: 6px;
        }
        .filter-select {
            width: 100%;
            padding: 8px 10px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(15, 23, 42, 0.7);
            color: #e2e8f0;
            font-size: 13px;
            font-family: 'Inter', sans-serif;
            outline: none;
            cursor: pointer;
        }
        .filter-select:focus {
            border-color: #6366f1;
        }
        .filter-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 8px;
        }
        .filter-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 6px 4px 10px;
            border-radius: 999px;
            background: rgba(99, 102, 241, 0.2);
            border: 1px solid rgba(99, 102, 241, 0.45);
            color: #e2e8f0;
            font-size: 12px;
            line-height: 1.2;
        }
        .filter-tag-remove {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 16px;
            height: 16px;
            border: none;
            border-radius: 50%;
            background: rgba(255,255,255,0.12);
            color: #e2e8f0;
            font-size: 10px;
            cursor: pointer;
            padding: 0;
            transition: background 0.15s;
        }
        .filter-tag-remove:hover {
            background: #ef4444;
        }
        .filter-clear {
            width: 100%;
            padding: 9px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(15, 23, 42, 0.7);
            color: #cbd5e1;
            font-size: 13px;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
        }
        .filter-clear:hover {
            border-color: #ef4444;
            color: #fecaca;
        }
        .filter-empty {
            font-size: 12px;
            color: #94a3b8;
        }

        /* Contact overlay */
        .contact-overlay {
            position: fixed;
            inset: 0;
            background: rgba(2, 6, 23, 0.72);
            backdrop-filter: blur(4px);
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .contact-overlay.active {
            display: flex;
        }
        .contact-modal {
            width: 420px;
            max-width: calc(100vw - 48px);
            max-height: calc(100vh - 48px);
            overflow-y: auto;
            background: #1e293b;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.6);
            padding: 24px;
            position: relative;
            box-sizing: border-box;
        }
        .contact-close {
            position: absolute;
            top: 14px;
            right: 14px;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            border: none;
            background: rgba(148, 163, 184, 0.15);
            color: #cbd5e1;
            font-size: 20px;
            line-height: 1;
            cursor: pointer;
            transition: background 0.15s;
        }
        .contact-close:hover {
            background: rgba(148, 163, 184, 0.3);
        }
        .contact-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
        }
        .contact-avatar {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            object-fit: cover;
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            font-weight: 600;
            flex-shrink: 0;
        }
        .contact-name {
            font-size: 18px;
            font-weight: 600;
            color: #f1f5f9;
        }
        .contact-position {
            font-size: 13px;
            color: #94a3b8;
            margin-top: 2px;
        }
        .contact-body {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .contact-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 4px;
            border-top: 1px solid rgba(255,255,255,0.06);
            font-size: 14px;
            color: #e2e8f0;
        }
        .contact-row-icon {
            width: 20px;
            text-align: center;
            opacity: 0.8;
        }
        .contact-row-label {
            width: 110px;
            color: #94a3b8;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            flex-shrink: 0;
        }
        .contact-row-value {
            word-break: break-word;
        }
        .contact-empty {
            color: #94a3b8;
            font-size: 13px;
            padding: 8px 4px;
        }

        /* Theme toggle button (matches the settings button, without the rotate). */
        .theme-toggle {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px);
            color: #cbd5e1;
            font-size: 18px;
            cursor: pointer;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }
        .theme-toggle:hover {
            border-color: #6366f1;
            background: #27364f;
        }
        /* Custom SVG moon/sun icons — inherit the button's muted colour via
           currentColor so they stay as understated as the other controls. */
        .theme-toggle svg {
            display: block;
            width: 18px;
            height: 18px;
        }

        /* -------------------------------------------------------------------
           Light theme. The dark theme above is the default and is left fully
           intact; this block only overrides colours when body.light-theme is
           set. Category cards, the indigo accent buttons, and the report-count
           bubble keep their indigo styling, which reads well on both themes.
        ------------------------------------------------------------------- */
        body.light-theme {
            background-color: #eef2f7;
            color: #0f172a;
            background-image:
                radial-gradient(at 0% 0%, hsla(210,40%,96%,1) 0, transparent 50%),
                radial-gradient(at 50% 0%, hsla(225,60%,88%,0.35) 0, transparent 50%),
                radial-gradient(at 100% 0%, hsla(339,60%,90%,0.25) 0, transparent 50%);
        }
        body.light-theme .node-card {
            background: #ffffff;
            border: 1px solid rgba(15, 23, 42, 0.1);

<body>
    <script>

        })();
    </script>
    <div class="controls-left">

    <div id="loading" class="loading">
        <div class="spinner"></div>
        LOADING ORGANIZATION DATA
    </div>
    <div id="chart-container"></div>

    <!-- ORG_DATA_PLACEHOLDER -->
    <script>
        (function () {
            const embeddedGraphElement = document.getElementById('org-graph-embedded');
            const embeddedPhotosElement = document.getElementById('org-photos-embedded');
            let orgDataPromise;
            if (embeddedGraphElement) {
                // Portable build: data is embedded directly in the page.
                orgDataPromise = Promise.resolve().then(() => ({
                    graph: JSON.parse(embeddedGraphElement.textContent),
                    photos: embeddedPhotosElement ? JSON.parse(embeddedPhotosElement.textContent) : {}
                }));
            } else {
                // Dev mode: fetch the raw JSON files served next to this template.
                orgDataPromise = Promise.all([
                    fetch('org_graph.json').then(response => {
                        if (!response.ok) throw new Error("Could not load org_graph.json");
                        return response.json();
                    }),
                    fetch('photos.json').then(response => response.ok ? response.json() : {}).catch(() => ({}))
                ]).then(([graph, photos]) => ({ graph, photos }));
            }
            orgDataPromise
            .then(({ graph, photos }) => {
                document.getElementById('loading').style.display = 'none';

                // Catalog of profile fields that can be shown on cards / in the overlay.
                const FIELD_DEFINITIONS = [
                    { key: 'email', label: 'Email', icon: '✉️', get: person => person.email },
                    { key: 'role', label: 'Department', icon: '🏢', get: person => person.role },
                    { key: 'mobilePhone', label: 'Mobile', icon: '📱', get: person => person.mobilePhone },
                    { key: 'businessPhone', label: 'Business phone', icon: '☎️', get: person => person.businessPhone },
                    { key: 'officeLocation', label: 'Office', icon: '🏬', get: person => person.officeLocation },
                    { key: 'location', label: 'Location', icon: '📍', get: person => [person.city, person.state, person.country].filter(Boolean).join(', ') },
                    { key: 'companyName', label: 'Company', icon: '🏛️', get: person => person.companyName },
                    { key: 'employeeId', label: 'Employee ID', icon: '🆔', get: person => person.employeeId },
                ];
                const MAX_CARD_FIELDS = 3;
                const FIELD_DEFINITION_BY_KEY = Object.fromEntries(FIELD_DEFINITIONS.map(field => [field.key, field]));

                // Which fields show on the cards (persisted, capped at MAX_CARD_FIELDS).
                function loadSelectedCardFields() {
                    try {
                        const savedFields = JSON.parse(localStorage.getItem('teamsOrg.cardFields'));
                        if (Array.isArray(savedFields)) {
                            const validFields = savedFields.filter(key => FIELD_DEFINITION_BY_KEY[key]).slice(0, MAX_CARD_FIELDS);
                            if (validFields.length) return validFields;
                        }
                    } catch (error) { /* ignore malformed stored value */ }
                    return ['companyName', 'role', 'officeLocation'];
                }
                let selectedCardFields = loadSelectedCardFields();

                // The wrapper adds this much space above every card; the node cell height is
                // sized to the card plus this so the report-count bubble lands on the card's
                // bottom edge (see nodeHeight / buttonY below).
                const CARD_WRAPPER_TOP_PADDING = 15;
                // The count bubble is 32px tall; the card's padding is half of that so the
                // bubble's upper half tucks neatly into the padding without covering content.
                const REPORT_BUBBLE_HEIGHT = 32;

                // How many of the chosen card fields actually have a value for this person.
                function countVisibleCardFields(person) {
                    return selectedCardFields
                        .map(key => FIELD_DEFINITION_BY_KEY[key])
                        .filter(Boolean)
                        .filter(field => field.get(person))
                        .length;
                }

                // Card height grows with the number of visible detail rows so short cards
                // don't leave empty space and full cards keep their bottom padding.
                function computeCardHeight(person) {
                    const CARD_BASE_HEIGHT = 150;      // avatar + name + title + top/bottom padding
                    const DETAILS_BOX_PADDING = 16;    // the details box's own top + bottom padding
                    const DETAIL_ROW_HEIGHT = 23;      // one detail line including its gap
                    const visibleFieldCount = countVisibleCardFields(person);
                    return visibleFieldCount === 0
                        ? CARD_BASE_HEIGHT
                        : CARD_BASE_HEIGHT + DETAILS_BOX_PADDING + visibleFieldCount * DETAIL_ROW_HEIGHT;
                }

                const escapeHtml = (value) => String(value == null ? '' : value)
                    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');

                // The graph stores relationships as edges; d3-org-chart needs a flat
                // id/parentId list. Reconstruct each person's manager (parentId) and
                // direct-report count from the IS_MANAGER_OF edges (from = manager,
                // to = report). The extractor guarantees one manager per person and a
                // cycle-free forest, so this maps cleanly onto a single parentId each.
                const graphNodes = Array.isArray(graph.nodes) ? graph.nodes : [];
                const graphEdges = Array.isArray(graph.edges) ? graph.edges : [];
                const managerIdByReportId = {};
                const directReportCountByManagerId = {};
                graphEdges.forEach(edge => {
                    if (!edge || edge.type !== 'IS_MANAGER_OF') return;
                    managerIdByReportId[edge.to] = edge.from;
                    directReportCountByManagerId[edge.from] = (directReportCountByManagerId[edge.from] || 0) + 1;
                });

                let peopleList = graphNodes.map(node => ({
                    id: node.id,
                    parentId: managerIdByReportId[node.id] || "",
                    name: node.name,
                    position: node.position,
                    email: node.email,
                    role: node.role,
                    mobilePhone: node.mobilePhone || "",
                    businessPhone: node.businessPhone || "",
                    officeLocation: node.officeLocation || "",
                    city: node.city || "",
                    state: node.state || "",
                    country: node.country || "",
                    companyName: node.companyName || "",
                    employeeId: node.employeeId || "",
                    directReportCount: directReportCountByManagerId[node.id] || 0
                }));

                const rootPeople = peopleList.filter(person => !person.parentId);
                if (rootPeople.length > 1) {
                    // Group the isolated / external roots under synthetic parent nodes so the
                    // chart has a single visual root instead of many disconnected trees.
                    peopleList.push({
                        id: "UNCATEGORIZED",
                        parentId: "ROOT",
                        name: "Uncategorized",
                        position: "Unassigned",
                        email: "",
                        role: "",
                        directReportCount: 0
                    });

                    peopleList.push({
                        id: "EXTERN",
                        parentId: "ROOT",
                        name: "Externals",
                        position: "External Partners / Contractors",
                        email: "",
                        role: "",
                        directReportCount: 0
                    });

                    let realRootCount = 0;
                    let uncategorizedCount = 0;
                    let externalCount = 0;

                    // A root counts as "external" when the word "extern" appears as a whole
                    // word in its title or department (matches "Extern", "External", not "Externship Coordinator").
                    const looksExternal = (person) => {
                        const externalWordPattern = /\bextern/i;
                        return externalWordPattern.test(person.position || '') || externalWordPattern.test(person.role || '');
                    };

                    rootPeople.forEach(person => {
                        const isEmployeeWithoutTitle = !person.position || person.position.trim().toLowerCase() === 'employee';

                        if (looksExternal(person)) {
                            person.parentId = "EXTERN";
                            externalCount++;
                        } else if (person.directReportCount === 0 && isEmployeeWithoutTitle) {
                            person.parentId = "UNCATEGORIZED";
                            uncategorizedCount++;
                        } else {
                            person.parentId = "ROOT";
                            realRootCount++;
                        }
                    });

                    const uncategorizedNode = peopleList.find(person => person.id === "UNCATEGORIZED");
                    uncategorizedNode.directReportCount = uncategorizedCount;
                    if (uncategorizedCount === 0) {
                        peopleList = peopleList.filter(person => person.id !== "UNCATEGORIZED");
                    }

                    const externalNode = peopleList.find(person => person.id === "EXTERN");
                    externalNode.directReportCount = externalCount;
                    if (externalCount === 0) {
                        peopleList = peopleList.filter(person => person.id !== "EXTERN");
                    }

                    peopleList.push({
                        id: "ROOT",
                        parentId: "",
                        name: "Organization",
                        position: "Company",
                        email: "",
                        role: "",
                        directReportCount: realRootCount + (uncategorizedCount > 0 ? 1 : 0) + (externalCount > 0 ? 1 : 0)
                    });
                } else if (rootPeople.length === 0 && peopleList.length > 0) {
                    // Everyone had a manager (a full cycle broken above): promote the first person to root.
                    peopleList[0].parentId = "";
                }

                // Sort so people with more direct reports appear first (at the top/left of branches).
                // The synthetic "Uncategorized" and "Externals" groups are always pushed to the end
                // of their sibling list, regardless of how many members they contain.
                const GROUP_NODE_IDS = new Set(["UNCATEGORIZED", "EXTERN"]);
                peopleList.sort((first, second) => {
                    const firstIsGroup = GROUP_NODE_IDS.has(first.id);
                    const secondIsGroup = GROUP_NODE_IDS.has(second.id);
                    if (firstIsGroup !== secondIsGroup) return firstIsGroup ? 1 : -1;
                    return second.directReportCount - first.directReportCount;
                });

                window.highlightedNodeId = null;

                const chart = new d3.OrgChart()
                    .container('#chart-container')
                    .data(peopleList)
                    // Fill the whole window (the library only auto-tracks width on render,
                    // so height is set explicitly here and kept in sync on resize below).
                    .svgHeight(window.innerHeight)
                    .svgWidth(window.innerWidth)
                    .nodeWidth(() => 260)
                    // Size the node cell to the card plus the wrapper padding so the node's
                    // bottom edge is the card's bottom edge — that's where the count bubble sits.
                    .nodeHeight((node) => CARD_WRAPPER_TOP_PADDING + computeCardHeight(node.data))
                    .childrenMargin(() => 50)
                    .compactMarginBetween(() => 40)
                    .compactMarginPair(() => 40)
                    // Larger, on-brand expand/collapse button showing the report count.
                    // Its height matches REPORT_BUBBLE_HEIGHT and the -Y offset is half of
                    // that, so the bubble's centre sits exactly on the card's bottom edge.
                    .nodeButtonWidth(() => 58)
                    .nodeButtonHeight(() => REPORT_BUBBLE_HEIGHT)
                    .nodeButtonX(() => -29)
                    .nodeButtonY(() => -REPORT_BUBBLE_HEIGHT / 2)
                    .buttonContent(({ node }) => {
                        const isExpanded = Boolean(node.children);
                        const reportCount = node.data._directSubordinatesPaging;
                        const label = `${isExpanded ? 'Collapse' : 'Expand'} ${reportCount} report${reportCount === 1 ? '' : 's'}`;
                        return `<div class="expand-button" title="${label}">
                            <span>${reportCount}</span>
                            <span class="expand-button-chevron">${isExpanded ? '▲' : '▼'}</span>
                        </div>`;
                    })
                    // Expand a single level, then expand the real top-level branches
                    // (see expandTopBranchesExceptSynthetic) so the structure is visible
                    // without expanding the whole (potentially huge) org up front, while the
                    // synthetic Uncategorized/Externals groups stay folded.
                    .initialExpandLevel(1)
                    .linkUpdate(function (linkData, linkIndex, linkElements) {
                        d3.select(this)
                            .attr('stroke', 'rgba(148, 163, 184, 0.3)')
                            .attr('stroke-width', 2);
                    })
                    .nodeContent(function (chartNode, nodeIndex, allNodes, chartState) {
                        const person = chartNode.data;
                        const photoDataUrl = photos[person.id];
                        const CATEGORY_NODE_ICONS = { ROOT: "🏢", UNCATEGORIZED: "❔", EXTERN: "🤝" };
                        const isCategoryNode = Object.prototype.hasOwnProperty.call(CATEGORY_NODE_ICONS, person.id);
                        const avatarMarkup = photoDataUrl
                            ? `<img class="node-image" loading="lazy" src="${photoDataUrl}" />`
                            : `<div class="node-image">${isCategoryNode ? CATEGORY_NODE_ICONS[person.id] : escapeHtml(person.name.charAt(0))}</div>`;

                        // Highlight the searched node and its path to the root — the
                        // library sets these flags via setUpToTheRootHighlighted().
                        const isHighlighted = chartNode.data._highlighted
                            || chartNode.data._upToTheRootHighlighted
                            || person.id === window.highlightedNodeId;

                        // Only the fields that actually have a value are shown, so a
                        // person lacking data gets a shorter card instead of empty space.
                        const detailEntries = selectedCardFields
                            .map(key => FIELD_DEFINITION_BY_KEY[key])
                            .filter(Boolean)
                            .map(field => ({ icon: field.icon, value: field.get(person) }))
                            .filter(entry => entry.value);

                        const cardHeight = computeCardHeight(person);

                        const detailsMarkup = detailEntries.length
                            ? `<div class="node-details">
                                        ${detailEntries.map(entry => `
                                        <div class="node-detail-item" title="${escapeHtml(entry.value)}">
                                            <span class="node-detail-icon">${entry.icon}</span> ${escapeHtml(entry.value)}
                                        </div>`).join('')}
                                    </div>`
                            : '';

                        return `
                            <div style="padding-top: ${CARD_WRAPPER_TOP_PADDING}px; height: 100%;">
                                <div class="node-card ${isCategoryNode ? 'category-card' : ''} ${isHighlighted ? 'highlighted' : ''}" style="height: ${cardHeight}px; width: 260px;"
                                    onclick="window.showContact('${person.id}')" title="Click for full contact info">
                                    ${avatarMarkup}
                                    <div class="node-name" title="${escapeHtml(person.name)}">${escapeHtml(person.name)}</div>
                                    <div class="node-position" title="${escapeHtml(person.position)}">${escapeHtml(person.position || '')}</div>
                                    ${detailsMarkup}
                                </div>
                            </div>
                        `;
                    })
                    .render();

                // The full, unfiltered set of people is the source of truth; filtering
                // renders a subset of this array while search always looks at all people.
                const allPeople = peopleList;
                const SYNTHETIC_NODE_IDS = new Set(['ROOT', 'UNCATEGORIZED', 'EXTERN']);
                const isSyntheticNode = (person) => SYNTHETIC_NODE_IDS.has(person.id);
                const peopleById = new Map(allPeople.map(person => [person.id, person]));

                // Companion to the single-level default view. d3-org-chart's `_expanded`
                // flag only reveals a node's *ancestors* (see expandSomeNodes in the lib),
                // not its own children — so to open the real top-level branches one level
                // deep we must flag *their reports* (the depth-2 nodes). Flagging every
                // report of a real branch reveals both that branch and its reports, while
                // the synthetic "Uncategorized"/"Externals" groups — whose reports we never
                // flag — stay folded. Root's direct children are flagged too so a childless
                // real branch (and the collapsed synthetic groups) still show at level 1.
                function expandTopBranchesExceptSynthetic() {
                    const rootPerson = allPeople.find(person => !person.parentId);
                    if (!rootPerson) return;
                    const realBranchIds = new Set(
                        allPeople
                            .filter(person => person.parentId === rootPerson.id && !GROUP_NODE_IDS.has(person.id))
                            .map(person => person.id)
                    );
                    rootPerson._expanded = true;
                    allPeople.forEach(person => {
                        if (person.parentId === rootPerson.id || realBranchIds.has(person.parentId)) {
                            person._expanded = true;
                        }
                    });
                }

                // Default view: expand two levels, then fold the synthetic groups away so
                // Uncategorized/Externals stay collapsed even though the rest is expanded.
                function showDefaultView() {
                    allPeople.forEach(person => { delete person._expanded; });
                    chart.data(allPeople).initialExpandLevel(1).render();
                    expandTopBranchesExceptSynthetic();
                    chart.render();
                    chart.fit();
                }

                // Filtered view: show only the matching people plus their managers, fully
                // expanded so every match is visible.
                function showFilteredView(filteredPeople) {
                    filteredPeople.forEach(person => { person._expanded = true; });
                    chart.data(filteredPeople).initialExpandLevel(1).render();
                    chart.fit();
                }

                expandTopBranchesExceptSynthetic();
                chart.render();

                // ---- Contact overlay ----
                const overlay = document.getElementById('contact-overlay');
                window.showContact = function (personId) {
                    const person = peopleById.get(personId);
                    if (!person) return;

                    const avatar = document.getElementById('contact-avatar');
                    const photoDataUrl = photos[person.id];
                    if (photoDataUrl) {
                        avatar.innerHTML = '';
                        avatar.style.backgroundImage = `url("${photoDataUrl}")`;
                        avatar.style.backgroundSize = 'cover';
                        avatar.style.backgroundPosition = 'center';
                    } else {
                        avatar.style.backgroundImage = 'none';
                        avatar.textContent = (person.name || '?').charAt(0);
                    }

                    document.getElementById('contact-name').textContent = person.name || '';
                    document.getElementById('contact-position').textContent = person.position || '';

                    const contactRows = FIELD_DEFINITIONS
                        .map(field => ({ label: field.label, icon: field.icon, value: field.get(person) }))
                        .filter(row => row.value)
                        .map(row => `
                            <div class="contact-row">
                                <span class="contact-row-icon">${row.icon}</span>
                                <span class="contact-row-label">${escapeHtml(row.label)}</span>
                                <span class="contact-row-value">${escapeHtml(row.value)}</span>
                            </div>`).join('');
                    document.getElementById('contact-body').innerHTML =
                        contactRows || '<div class="contact-empty">No additional contact information available.</div>';

                    overlay.classList.add('active');
                };
                window.hideContact = function () {
                    overlay.classList.remove('active');
                };
                document.getElementById('contact-close').addEventListener('click', window.hideContact);
                overlay.addEventListener('click', (event) => {
                    if (event.target === overlay) window.hideContact();
                });
                document.addEventListener('keydown', (event) => {
                    if (event.key === 'Escape') window.hideContact();
                });

                // ---- Settings cogwheel: choose up to 3 card fields ----
                const settingsButton = document.getElementById('settings-btn');
                const settingsPanel = document.getElementById('settings-panel');
                const settingsOptions = document.getElementById('settings-options');

                function renderSettingsOptions() {
                    const atMaximumFields = selectedCardFields.length >= MAX_CARD_FIELDS;
                    settingsOptions.innerHTML = FIELD_DEFINITIONS.map(field => {
                        const isSelected = selectedCardFields.includes(field.key);
                        const isDisabled = !isSelected && atMaximumFields;
                        return `
                            <label class="settings-option ${isDisabled ? 'disabled' : ''}">
                                <input type="checkbox" value="${field.key}" ${isSelected ? 'checked' : ''} ${isDisabled ? 'disabled' : ''}>
                                <span class="settings-option-icon">${field.icon}</span>
                                <span>${escapeHtml(field.label)}</span>
                            </label>`;
                    }).join('');
                }

                function applySelectedCardFields() {
                    localStorage.setItem('teamsOrg.cardFields', JSON.stringify(selectedCardFields));
                    chart.render();
                }

                settingsOptions.addEventListener('change', (event) => {
                    const checkbox = event.target;
                    if (!checkbox || checkbox.type !== 'checkbox') return;
                    if (checkbox.checked) {
                        if (!selectedCardFields.includes(checkbox.value) && selectedCardFields.length < MAX_CARD_FIELDS) {
                            selectedCardFields.push(checkbox.value);
                        }
                    } else {
                        selectedCardFields = selectedCardFields.filter(key => key !== checkbox.value);
                    }
                    renderSettingsOptions();
                    applySelectedCardFields();
                });

                settingsButton.addEventListener('click', (event) => {
                    event.stopPropagation();
                    settingsPanel.classList.toggle('active');
                });
                document.addEventListener('click', (event) => {
                    if (!event.target.closest('.settings-container')) {
                        settingsPanel.classList.remove('active');
                    }
                });
                renderSettingsOptions();

                // ---- Light / dark theme toggle ----
                const themeToggleButton = document.getElementById('theme-toggle-btn');
                // Custom monochrome SVG icons (inherit the button colour via currentColor).
                const MOON_ICON = '<svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
                const SUN_ICON = '<svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4.2" fill="currentColor" stroke="none"/><path d="M12 2.5v2.3M12 19.2v2.3M4.7 4.7l1.6 1.6M17.7 17.7l1.6 1.6M2.5 12h2.3M19.2 12h2.3M4.7 19.3l1.6-1.6M17.7 6.3l1.6-1.6"/></svg>';
                function syncThemeToggle() {
                    const isLight = document.body.classList.contains('light-theme');
                    themeToggleButton.innerHTML = isLight ? SUN_ICON : MOON_ICON;
                    themeToggleButton.title = isLight ? 'Switch to dark theme' : 'Switch to light theme';
                }
                themeToggleButton.addEventListener('click', () => {
                    const isLight = document.body.classList.toggle('light-theme');
                    try {
                        localStorage.setItem('teamsOrg.theme', isLight ? 'light' : 'dark');
                    } catch (error) { /* ignore unavailable storage */ }
                    syncThemeToggle();
                });
                syncThemeToggle();

                // Collapse the tree but keep the top "Organization" node expanded so its
                // direct children stay visible.
                const collapseButton = document.getElementById('collapse-btn');
                collapseButton.addEventListener('click', () => {
                    window.highlightedNodeId = null;
                    chart.clearHighlighting();
                    const rootPerson = chart.getChartState().data.find(person => !person.parentId);
                    chart.getChartState().data.forEach(person => {
                        person._expanded = rootPerson ? person.id === rootPerson.id : false;
                    });
                    chart.initialExpandLevel(1).render();
                    chart.fit();
                });

                // ---- Layout direction picker (top / bottom / left / right) ----
                const directionButton = document.getElementById('direction-btn');
                const directionPanel = document.getElementById('direction-panel');
                directionButton.addEventListener('click', (event) => {
                    event.stopPropagation();
                    directionPanel.classList.toggle('active');
                });
                document.addEventListener('click', (event) => {
                    if (!event.target.closest('.direction-container')) {
                        directionPanel.classList.remove('active');
                    }
                });
                directionPanel.addEventListener('click', (event) => {
                    const button = event.target.closest('.direction-option');
                    if (!button) return;
                    const direction = button.dataset.direction;
                    directionPanel.querySelectorAll('.direction-option').forEach(other => {
                        other.classList.toggle('active', other === button);
                    });
                    chart.layout(direction).render().fit();
                    directionPanel.classList.remove('active');
                });

                // ---- Filter panel: narrow the tree by any categorical detail ----
                // Every datapoint except name, email, phone numbers and employee id can be
                // filtered. Options are built from the data, so only values that actually
                // occur show up.
                const FILTER_CATEGORIES = [
                    { key: 'position', label: 'Title', get: person => person.position },
                    { key: 'role', label: 'Department', get: person => person.role },
                    { key: 'companyName', label: 'Company', get: person => person.companyName },
                    { key: 'officeLocation', label: 'Office', get: person => person.officeLocation },
                    { key: 'city', label: 'City', get: person => person.city },
                    { key: 'state', label: 'State / Region', get: person => person.state },
                    { key: 'country', label: 'Country', get: person => person.country },
                ];

                // A single field can pack several values separated by commas, slashes or
                // semicolons — e.g. a department "FS/ENG/D/TO". Split those apart so each
                // token becomes its own filterable value ("FS", "ENG", "D", "TO"), and a
                // filter for "ENG" matches anyone whose department contains that token.
                function splitFilterTokens(value) {
                    if (!value) return [];
                    return String(value)
                        .split(/[,/;]/)
                        .map(token => token.trim())
                        .filter(Boolean);
                }

                // Distinct, sorted tokens per category (excluding the synthetic group nodes).
                const distinctValuesByCategory = new Map();
                for (const category of FILTER_CATEGORIES) {
                    const values = new Set();
                    for (const person of allPeople) {
                        if (isSyntheticNode(person)) continue;
                        for (const token of splitFilterTokens(category.get(person))) values.add(token);
                    }
                    if (values.size > 0) {
                        distinctValuesByCategory.set(category.key, [...values].sort((first, second) => first.localeCompare(second)));
                    }
                }
                // Only offer categories that actually have values in this organization.
                const availableFilterCategories = FILTER_CATEGORIES.filter(category => distinctValuesByCategory.has(category.key));

                // category key -> Set of selected values.
                const activeFilters = new Map();

                const filterButton = document.getElementById('filter-btn');
                const filterPanel = document.getElementById('filter-panel');
                const filterCategoriesContainer = document.getElementById('filter-categories');
                const filterCountBadge = document.getElementById('filter-count-badge');
                const filterClearButton = document.getElementById('filter-clear');

                function countSelectedFilters() {
                    let total = 0;
                    for (const values of activeFilters.values()) total += values.size;
                    return total;
                }

                function renderFilterCategories() {
                    if (availableFilterCategories.length === 0) {
                        filterCategoriesContainer.innerHTML = '<div class="filter-empty">No filterable details are available.</div>';
                        filterClearButton.style.display = 'none';
                        return;
                    }
                    filterCategoriesContainer.innerHTML = availableFilterCategories.map(category => {
                        const selectedValues = activeFilters.get(category.key) || new Set();
                        const optionsMarkup = distinctValuesByCategory.get(category.key)
                            .filter(value => !selectedValues.has(value))
                            .map(value => `<option value="${escapeHtml(value)}">${escapeHtml(value)}</option>`)
                            .join('');
                        const chipsMarkup = [...selectedValues].map(value => `
                            <span class="filter-tag">${escapeHtml(value)}<button type="button" class="filter-tag-remove" data-category="${escapeHtml(category.key)}" data-value="${escapeHtml(value)}" title="Remove">✕</button></span>`).join('');
                        return `
                            <div class="filter-category">
                                <label class="filter-category-label">${escapeHtml(category.label)}</label>
                                <select class="filter-select" data-category="${escapeHtml(category.key)}">
                                    <option value="">Add ${escapeHtml(category.label.toLowerCase())}…</option>
                                    ${optionsMarkup}
                                </select>
                                ${chipsMarkup ? `<div class="filter-tags">${chipsMarkup}</div>` : ''}
                            </div>`;
                    }).join('');

                    const selectedCount = countSelectedFilters();
                    filterClearButton.style.display = selectedCount > 0 ? 'block' : 'none';
                    if (selectedCount > 0) {
                        filterCountBadge.textContent = String(selectedCount);
                        filterCountBadge.style.display = 'inline-flex';
                    } else {
                        filterCountBadge.style.display = 'none';
                    }
                }

                // Returns the filtered people (matches + their managers) or null when no
                // filters are active.
                function computeFilteredPeople() {
                    const activeCategories = availableFilterCategories
                        .map(category => ({ category, values: activeFilters.get(category.key) }))
                        .filter(entry => entry.values && entry.values.size > 0);
                    if (activeCategories.length === 0) return null;

                    // A person matches when, for every active category, their value is one of
                    // the selected tags (AND across categories, OR within a category).
                    const personMatches = (person) => activeCategories.every(({ category, values }) => {
                        const tokens = splitFilterTokens(category.get(person));
                        return tokens.some(token => values.has(token));
                    });

                    const keepIds = new Set();
                    for (const person of allPeople) {
                        if (isSyntheticNode(person)) continue;
                        if (!personMatches(person)) continue;
                        // Keep the match and its whole management chain so the tree stays connected.
                        let current = person;
                        while (current && !keepIds.has(current.id)) {
                            keepIds.add(current.id);
                            current = current.parentId ? peopleById.get(current.parentId) : null;
                        }
                    }
                    return allPeople.filter(person => keepIds.has(person.id));
                }

                function applyFilters() {
                    const filteredPeople = computeFilteredPeople();
                    if (!filteredPeople) {
                        showDefaultView();
                    } else {
                        showFilteredView(filteredPeople);
                    }
                }

                filterCategoriesContainer.addEventListener('change', (event) => {
                    const select = event.target.closest('.filter-select');
                    if (!select || !select.value) return;
                    const categoryKey = select.getAttribute('data-category');
                    if (!activeFilters.has(categoryKey)) activeFilters.set(categoryKey, new Set());
                    activeFilters.get(categoryKey).add(select.value);
                    renderFilterCategories();
                    applyFilters();
                });

                filterCategoriesContainer.addEventListener('click', (event) => {
                    const removeButton = event.target.closest('.filter-tag-remove');
                    if (!removeButton) return;
                    const categoryKey = removeButton.getAttribute('data-category');
                    const value = removeButton.getAttribute('data-value');
                    const values = activeFilters.get(categoryKey);
                    if (values) {
                        values.delete(value);
                        if (values.size === 0) activeFilters.delete(categoryKey);
                    }
                    renderFilterCategories();
                    applyFilters();
                });

                filterClearButton.addEventListener('click', () => {
                    activeFilters.clear();
                    renderFilterCategories();
                    applyFilters();
                });

                filterButton.addEventListener('click', (event) => {
                    event.stopPropagation();
                    filterPanel.classList.toggle('active');
                });
                document.addEventListener('click', (event) => {
                    if (!event.target.closest('.filter-container')) {
                        filterPanel.classList.remove('active');
                    }
                });
                renderFilterCategories();

                // ---- Fuzzy search (matches across every field) ----
                // against any field (AND across terms). This lets "human rotterdam" find
                // someone in the "Human Resources" department located in Rotterdam.
                const SEARCHABLE_FIELDS = [
                    'name', 'position', 'role', 'email', 'mobilePhone', 'businessPhone',
                    'officeLocation', 'city', 'state', 'country', 'companyName', 'employeeId'
                ];
                const fuzzySearch = new Fuse(peopleList, {
                    keys: SEARCHABLE_FIELDS,
                    threshold: 0.3,
                    ignoreLocation: true,
                    includeScore: true
                });
                const personById = new Map(peopleList.map(person => [person.id, person]));

                function searchPeople(query) {
                    const terms = query.trim().split(/\s+/).filter(Boolean);
                    if (terms.length === 0) return [];

                    let matchingIds = null;
                    const combinedScoreById = new Map();
                    for (const term of terms) {
                        const idsForTerm = new Set();
                        for (const match of fuzzySearch.search(term)) {
                            idsForTerm.add(match.item.id);
                            combinedScoreById.set(match.item.id, (combinedScoreById.get(match.item.id) || 0) + (match.score ?? 0));
                        }
                        // Keep only people matched by every term so far.
                        matchingIds = matchingIds === null
                            ? idsForTerm
                            : new Set([...matchingIds].filter(id => idsForTerm.has(id)));
                        if (matchingIds.size === 0) break;
                    }

                    return [...(matchingIds || [])]
                        .map(id => ({ item: personById.get(id), score: combinedScoreById.get(id) || 0 }))
                        .sort((first, second) => first.score - second.score);
                }

                const searchInput = document.getElementById('search-input');
                const searchResults = document.getElementById('search-results');

                let selectedSearchIndex = -1;

                function updateSearchSelection() {
                    const resultItems = Array.from(searchResults.querySelectorAll('.search-result-item'));
                    resultItems.forEach((item, itemIndex) => {
                        if (itemIndex === selectedSearchIndex) {
                            item.classList.add('selected');
                            item.scrollIntoView({ block: 'nearest' });
                        } else {
                            item.classList.remove('selected');
                        }
                    });
                }

                searchInput.addEventListener('input', (event) => {
                    selectedSearchIndex = -1; // Reset selection on new input
                    const query = event.target.value;
                    if (!query) {
                        searchResults.classList.remove('active');
                        return;
                    }

                    const matches = searchPeople(query).slice(0, 8); // Show top 8 matches

                    if (matches.length === 0) {
                        searchResults.innerHTML = '<div style="padding:12px; color:#94a3b8; font-size:13px; text-align:center;">No results found</div>';
                    } else {
                        searchResults.innerHTML = matches.map(match => `
                            <div class="search-result-item" data-id="${escapeHtml(match.item.id)}">
                                <div class="result-name">${escapeHtml(match.item.name)}</div>
                                <div class="result-role">${escapeHtml(match.item.position || match.item.role || 'Employee')}</div>
                            </div>
                        `).join('');
                    }
                    searchResults.classList.add('active');
                });

                searchInput.addEventListener('keydown', (event) => {
                    const resultItems = Array.from(searchResults.querySelectorAll('.search-result-item'));
                    if (resultItems.length === 0 || !searchResults.classList.contains('active')) return;

                    if (event.key === 'ArrowDown') {
                        event.preventDefault();
                        selectedSearchIndex = Math.min(selectedSearchIndex + 1, resultItems.length - 1);
                        updateSearchSelection();
                    } else if (event.key === 'ArrowUp') {
                        event.preventDefault();
                        selectedSearchIndex = Math.max(selectedSearchIndex - 1, -1);
                        updateSearchSelection();
                    } else if (event.key === 'Enter') {
                        event.preventDefault();
                        if (selectedSearchIndex >= 0 && selectedSearchIndex < resultItems.length) {
                            resultItems[selectedSearchIndex].click();
                        } else if (resultItems.length > 0) {
                            // If they press enter without selecting, default to the first one
                            resultItems[0].click();
                        }
                    }
                });

                searchResults.addEventListener('click', (event) => {
                    const resultItem = event.target.closest('.search-result-item');
                    if (!resultItem) return;

                    const nodeId = resultItem.getAttribute('data-id');

                    // Hide results
                    searchResults.classList.remove('active');
                    searchInput.value = resultItem.querySelector('.result-name').innerText;

                    // Update state and rerender to show highlight
                    window.highlightedNodeId = nodeId;

                    // If a filter is hiding the person, drop back to the full tree so the
                    // result can actually be shown.
                    const isRendered = chart.getChartState().data.some(person => person.id === nodeId);
                    if (!isRendered) {
                        activeFilters.clear();
                        renderFilterCategories();
                        showDefaultView();
                    }

                    chart.clearHighlighting();
                    chart.setUpToTheRootHighlighted(nodeId);
                    chart.render();

                    // Delay centering slightly to allow expansion animation
                    setTimeout(() => {
                        chart.setCentered(nodeId).render();
                    }, 300);
                });

                // Close dropdown when clicking outside
                document.addEventListener('click', (event) => {
                    if (!event.target.closest('.search-container')) {
                        searchResults.classList.remove('active');
                    }
                });

                // Intercept Cmd+F / Ctrl+F so it focuses this search box instead of the
                // browser's native find bar (which can't see collapsed/off-screen nodes).
                document.addEventListener('keydown', (event) => {
                    const isFindShortcut = (event.metaKey || event.ctrlKey) && !event.altKey
                        && (event.key === 'f' || event.key === 'F');
                    if (!isFindShortcut) return;
                    event.preventDefault();
                    searchInput.focus();
                    searchInput.select();
                });

                // Instead of expanding the entire organization (which causes massive lag for large orgs),
                // we expand only a few levels (see initialExpandLevel) and let the user expand manually.
                chart.fit();

                // Keep the chart filling the window when it is resized (debounced so a drag
                // doesn't trigger a re-render on every pixel).
                let resizeTimer = null;
                window.addEventListener('resize', () => {
                    clearTimeout(resizeTimer);
                    resizeTimer = setTimeout(() => {
                        chart.svgHeight(window.innerHeight).svgWidth(window.innerWidth).render().fit();
                    }, 150);
                });
            })
            .catch(error => {
                document.getElementById('loading').innerHTML = `
                    <div style="text-align: center; color: #f87171; max-width: 400px; padding: 24px; background: rgba(30, 41, 59, 0.8); border-radius: 12px; border: 1px solid rgba(248, 113, 113, 0.2);">
                        <h3 style="margin-top: 0; font-weight: 500;">Error Loading Data</h3>
                        <p style="opacity: 0.9;">${error.message}</p>
                        <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 16px 0;">
                        <p style="font-size: 13px; color: #94a3b8; text-align: left; line-height: 1.5; margin-bottom: 0;">
                            1. Did you run <code>teams-org extract</code> to generate <strong>org_graph.json</strong>?<br>
                            2. Are you serving this file via a local web server?<br>
                            <span style="color: #6366f1; font-family: monospace; display: block; margin-top: 8px; padding: 8px; background: rgba(0,0,0,0.3); border-radius: 6px;">teams-org extract</span>
                        </p>
                    </div>
                `;
            });
        })();
    </script>
</body>
</html>
